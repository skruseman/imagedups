syntax = "proto3";

package demo;

// Metadata for one duplicate-image scan run.
message RunRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // Identifier for this run (unique within the database).
    uint32 id = 2;

    // Root directory (starting point) used by the run.
    string path = 3;

    // Optional human-readable label for the run.
    string description = 4;

    // Platform or host information captured for the run.
    string platform = 5;

    // Run start timestamp.
    float date_time = 6;

    // Total runtime in seconds.
    float dur_secs = 7;

    // Final run status, such as completed or failed.
    string status = 8;

    // Identifier of the root directory.
    uint32 root_id = 9;

    // Number of directories seen during the run.
    uint32 num_dirs = 10;

    // Number of files seen during the run.
    uint32 num_files = 11;

    // Extra run metadata not represented by dedicated fields.
    map<string,string> extra = 12;

    // Error details when the run did not complete successfully.
    string error = 13;
}

// Directory metadata captured during a scan run.
message DirRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // Identifier of the run that produced this directory record.
    uint32 run_id = 2;

    // Directory identifier unique within the run.
    uint32 id = 3;

    // Parent directory identifier; 0 for root dir.
    uint32 parent_id = 4;

    // Path of the directory relative to the run's root directory; empty for root dir.
    string path = 5;

    // Directory timestamp captured during the scan.
    float date_time = 6;

    // Hash of the files in the directory (xxhash, 8 bytes).
    string files_hash = 7;

    // Hash of the directories contained in the directory (xxhash, 8 bytes).
    string dirs_hash = 8;

    // Overall hash of the directory (xxhash, 8 bytes).
    string all_hash = 9;

    // Number of file entries in this directory.
    uint32 num_files = 10;

    // Number of directory entries in this directory.
    uint32 num_dirs = 11;

    // Identifiers of contained files.
    repeated uint32 file_ids = 12;

    // Identifiers of contained directories.
    repeated uint32 dir_ids = 13;
}

// File metadata captured during a scan run.
message FileRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // Identifier of the run that produced this file record.
    uint32 run_id = 2;

    // File identifier unique within the run.
    uint32 id = 3;

    // File name.
    string name = 4;

    // Identifier of containing directory.
    uint32 dir_id = 5;

    // File timestamp captured during the scan.
    float date_time = 6;

    // File length.
    uint64 length = 7;

    // File hash (sha256).
    string hash = 8;
}
