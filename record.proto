syntax = "proto3";

package demo;

// Metadata for one duplicate-image scan run.
message RunRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // Identifier for this run (unique within the database).
    uint32 id = 2;

    // UUID, for identification across databases.
    bytes uuid = 3;

    // Root directory (starting point) used by the run.
    string path = 4;

    // Optional human-readable label for the run.
    string description = 5;

    // Platform or host information captured for the run.
    string platform = 6;

    // Start timestamp of the run.
    float start_time = 7;

    // Total runtime of the run in seconds.
    float dur_secs = 8;

    // Final run status, such as completed or failed.
    string status = 9;

    // Identifier (composite) of the run's root directory.
    bytes root_id = 10;

    // Number of directories seen during the run.
    uint32 num_dirs = 11;

    // Number of files seen during the run.
    uint32 num_files = 12;

    // Extra run metadata not represented by dedicated fields.
    map<string,string> extra = 13;

    // Error details when the run did not complete successfully.
    string error = 14;

    // User tags.
    repeated string tags = 15;
}

// Directory metadata captured during a scan run.
message DirRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // Directory identifier unique within the run.
    // This composite identifier contains the run id.
    bytes id = 2;

    // Parent directory identifier (composite); empty for root dir.
    bytes parent_id = 3;

    // Path of the directory relative to the run's root directory; empty for root dir.
    string path = 4;

    // Directory timestamp captured during the scan.
    float date_time = 5;

    // Hash of the files in the directory (xxhash, 8 bytes).
    string files_hash = 6;

    // Hash of the directories contained in the directory (xxhash, 8 bytes).
    string dirs_hash = 7;

    // Identifiers (composite) of contained files.
    repeated bytes file_ids = 8;

    // Identifiers (composite) of contained directories.
    repeated bytes dir_ids = 9;

    // User tags.
    repeated string tags = 10;
}

// File metadata captured during a scan run.
message FileRecord {
    // Version of this protobuf schema used when the record was written.
    uint32 schema_version = 1;

    // File identifier, unique for the containing dir.
    // This composite identifier contains the run and dir ids.
    bytes id = 2;

    // File name.
    string name = 3;

    // File timestamp captured during the scan.
    float date_time = 4;

    // File length.
    uint64 length = 5;

    // File hash (sha256).
    string hash = 6;

    // User tags.
    repeated string tags = 10;
}
