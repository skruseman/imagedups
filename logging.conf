[loggers]
keys=root,filehashing

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter,myFormatter


[logger_root]
level=DEBUG
handlers=consoleHandler,fileHandler

[logger_filehashing]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=filehashing
propagate=0


[handler_consoleHandler]
class=StreamHandler
args=(sys.stdout,)
level=DEBUG
formatter=myFormatter

[handler_fileHandler]
class=FileHandler
args=('imdup.log', 'w')
level=DEBUG
formatter=myFormatter


[formatter_simpleFormatter]
format=%(asctime.20)s - %(name)s - %(levelname)s - %(message)s

[formatter_myFormatter]
format=%(asctime)s,%(msecs)03d %(levelname)-5s [%(threadName)-12s]  %(message)s  [%(funcName)s]
datefmt=%H:%M:%S